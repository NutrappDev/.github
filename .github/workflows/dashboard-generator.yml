name: Dashboard Generator

# Genera /docs/data/repos.json consultando la API de GitHub.
# GitHub Pages sirve el JSON estático; el frontend nunca hace llamadas API directas.
#
# Requiere secret: ORG_READ_TOKEN
#   → PAT clásico con exactamente dos scopes:
#       • repo      — lee repos privados, tags, commits, branches y workflow runs
#       • read:org  — lista repos de la organización (/orgs/NutrappDev/repos)
#   → Configurar como Organization Secret en NutrappDev (disponible para este repo)
#   → NO se necesita: workflow, write:org, admin:*, packages ni ningún otro scope

on:
  schedule:
    - cron: "0 5 * * 1" # Semanal, lunes 5 AM UTC (domingo 12 AM Colombia)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Solo generar repos.json sin hacer commit (para pruebas)"
        type: boolean
        default: false
  repository_dispatch:
    types: [deployment-completed] # Disparado por pr-checks.yml de cada repo al hacer merge

jobs:
  generate:
    name: Generate repos.json
    runs-on: ubuntu-latest
    permissions:
      contents: write # Para commitear repos.json

    steps:
      # ─── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─── Verificar token antes de correr el script ────────────────────────
      - name: Verify token
        env:
          GH_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::El secret ORG_READ_TOKEN no está disponible para este repositorio."
            echo "::error::Solución: GitHub → NutrappDev org → Settings → Secrets and variables → Actions → ORG_READ_TOKEN → editar → Repository access → incluir NutrappDev/.github"
            exit 1
          fi
          echo "✅ Token disponible"

      # ─── Generar repos.json ────────────────────────────────────────────────
      - name: Generate repos.json
        env:
          GH_TOKEN:    ${{ secrets.ORG_READ_TOKEN }}
          JIRA_EMAIL:  jgaray@nutrapp.com.co
          JIRA_TOKEN:  ${{ secrets.JIRA_TOKEN }}
        run: node .github/scripts/generate-dashboard.js docs/data/repos.json

      # ─── Mostrar resumen en el log ─────────────────────────────────────────
      - name: Show summary
        run: |
          TOTAL=$(jq '.total_repos' docs/data/repos.json)
          WITH_PROD=$(jq '[.repos[] | select(.production != null)] | length' docs/data/repos.json)
          WITH_QA=$(jq '[.repos[] | select(.qa != null)] | length' docs/data/repos.json)
          echo "### Dashboard generado" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total repos | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Con tag de producción | $WITH_PROD |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Con tag de QA | $WITH_QA |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Generado | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"

      # ─── Commit y push (solo si hay cambios y no es dry_run) ──────────────
      - name: Commit repos.json
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/repos.json
          git diff --staged --quiet && echo "Sin cambios — repos.json ya está actualizado." || \
            git commit -m "chore(dashboard): actualizar datos de repos [skip ci]"

      - name: Push
        if: ${{ !inputs.dry_run }}
        run: git push
