name: Dashboard Generator

# Genera /docs/data/repos.json consultando la API de GitHub.
# GitHub Pages sirve el JSON estático; el frontend nunca hace llamadas API directas.
#
# Requiere secret: ORG_READ_TOKEN
#   → PAT clásico o fine-grained con scope: read:org + read:contents en todos los repos
#   → Configurar como Organization Secret en NutrappDev (disponible para este repo)

on:
  schedule:
    - cron: "0 6 * * *" # Diario a las 6 AM UTC (1 AM Colombia)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Solo generar repos.json sin hacer commit (para pruebas)"
        type: boolean
        default: false

jobs:
  generate:
    name: Generate repos.json
    runs-on: ubuntu-latest
    permissions:
      contents: write # Para commitear repos.json

    steps:
      # ─── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── 2. Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─── 3. Generar repos.json ────────────────────────────────────────────────
      - name: Generate repos.json
        env:
          GH_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
        run: node .github/scripts/generate-dashboard.js docs/data/repos.json

      # ─── 4. Mostrar resumen en el log ─────────────────────────────────────────
      - name: Show summary
        run: |
          TOTAL=$(node -e "const d=require('./docs/data/repos.json'); console.log(d.total_repos)")
          WITH_PROD=$(node -e "const d=require('./docs/data/repos.json'); console.log(d.repos.filter(r=>r.production).length)")
          WITH_QA=$(node -e "const d=require('./docs/data/repos.json'); console.log(d.repos.filter(r=>r.qa).length)")
          echo "### Dashboard generado" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total repos | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Con tag de producción | $WITH_PROD |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Con tag de QA | $WITH_QA |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Generado | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"

      # ─── 5. Commit y push (solo si hay cambios y no es dry_run) ──────────────
      - name: Commit repos.json
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/repos.json
          git diff --staged --quiet && echo "Sin cambios — repos.json ya está actualizado." || \
            git commit -m "chore(dashboard): actualizar datos de repos [skip ci]"

      - name: Push
        if: ${{ !inputs.dry_run }}
        run: git push
