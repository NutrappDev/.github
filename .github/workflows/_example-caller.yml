# EJEMPLO — Copiar este archivo en cada repo bajo .github/workflows/pr-checks.yml
# Este archivo NO hace nada por sí solo (está en el repo .github y no se activa).
#
# Uso:
#   cp .github/workflows/_example-caller.yml <tu-repo>/.github/workflows/pr-checks.yml
#
# Secrets necesarios (heredados automáticamente con `secrets: inherit`):
#   • ORG_READ_TOKEN — PAT clásico con scopes: repo + read:org
#     Configurar en NutrappDev → Settings → Secrets → Actions (Organization secret)
#
# Para actualizar el dashboard al hacer deploy, agregar en tu workflow de deploy:
#
#   - name: Actualizar dashboard
#     if: success()
#     run: |
#       gh api repos/NutrappDev/.github/dispatches \
#         -f event_type=deployment-completed \
#         -f "client_payload[repo]=${{ github.repository }}"
#     env:
#       GH_TOKEN: ${{ secrets.ORG_READ_TOKEN }}

name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main
      - qa
      - develop

jobs:
  validate:
    uses: NutrappDev/.github/.github/workflows/pr-validation.yml@main
    secrets: inherit

  security:
    uses: NutrappDev/.github/.github/workflows/security-check.yml@main
    secrets: inherit

  commitlint:
    uses: NutrappDev/.github/.github/workflows/commitlint.yml@main
    secrets: inherit
